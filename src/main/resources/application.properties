server.port=8080

# ----------------------------
# MySQL + JPA configuration
# ----------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/finance_access_backend?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123

# For local development:
# - create: creates schema every startup (dangerous for real data)
# - update: updates schema automatically (good for learning / assignments)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ----------------------------
# JWT configuration (used in Step 6)
# ----------------------------
app.jwt.secret=change-this-secret-at-least-32-chars
app.jwt.expiration-ms=3600000
app.jwt.issuer=finance-access-backend

# Helpful default for validation errors
server.error.include-message=always

